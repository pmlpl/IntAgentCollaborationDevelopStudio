# config/agents.yaml — 终端 Agent CLI（非 IDE）
# 安装说明见 docs/INSTALL-AGENTS.md；检测：python -m cli.studio agent status
# byok: true = 可接 DeepSeek / Ollama / LM Studio 等第三方模型（无需厂商订阅）
# model: 启动时自动传入，跳过 Agent 自身的模型选择对话框
# env:   启动时注入的环境变量（如 API Key 提示，实际 Key 由用户在 Agent 终端内配置）
agents:
  claude-code:
    name: Claude Code
    command: claude
    byok: false
    flags: "-p"
    flags_interactive: "--dangerously-skip-permissions"
    interactive:
      mode: append_system_prompt_file
    strengths: [复杂推理, 任务拆解, 技术决策, 全栈]
    works_with: [claude-sonnet]
    roles: [技术主管, 架构]
    note: 默认需 Anthropic 订阅；自配 OpenAI 兼容网关时可改 byok 为 true

  codex:
    name: OpenAI Codex
    command: codex
    byok: false
    flags: "exec"
    flags_interactive: ""
    interactive:
      mode: task_file_context
    strengths: [快速实现, 后端API, 脚本, 高吞吐]
    works_with: [gpt-5, chatgpt-plus]
    roles: [后端开发, 脚本]
    note: 需 ChatGPT Plus / OpenAI 账号，不支持纯第三方模型

  gemini-cli:
    name: Gemini CLI
    command: gemini
    byok: false
    flags: "-p"
    flags_interactive: ""
    interactive:
      mode: task_file_context
    strengths: [前端UI, 多模态, 原型, 免费额度]
    works_with: [gemini-2.5-flash, gemini-2.5-pro]
    roles: [前端开发, 移动端]
    note: 绑定 Google 账号/API，非通用 BYOK

  hermes:
    name: Hermes
    command: hermes
    byok: true
    flags: "chat -q"
    flags_interactive: "chat --tui --yes"
    interactive:
      mode: task_file_context
      # 任务注入：.hermes.md + AGENTS.md + HERMES_TUI_QUERY（见 agent_launcher）
    # Hermes 从 ~/.config/hermes/config.yaml 读取模型；此处 env 仅补提示
    env:
      HERMES_DEFAULT_MODEL: deepseek-v4-pro
    strengths: [持久记忆, 文档, 配置, 小程序]
    works_with: [deepseek-v4-pro, qwen, ollama]
    roles: [后端开发, 文档, 小程序]

  aider:
    name: Aider
    command: aider
    byok: true
    flags: "--message"
    flags_interactive: "--model deepseek/deepseek-chat --yes"
    interactive:
      mode: task_file_context
    strengths: [Git提交, 代码审查, 可回滚, 结对编程]
    works_with: [任意API模型, ollama, deepseek]
    roles: [测试审查, Code Review]

  opencode:
    name: OpenCode
    command: opencode
    byok: true
    flags: "run"
    flags_interactive: "--model deepseek/deepseek-chat --yes"
    interactive:
      mode: run_interactive
    strengths: [多模型, 重构, 75+提供商]
    works_with: [deepseek, openai兼容, 本地模型]
    roles: [技术主管, 测试审查, 重构, 备用引擎]

  goose:
    name: Goose
    command: goose
    byok: true
    flags: "run"
    flags_interactive: "session --yes"
    interactive:
      mode: task_file_context
    strengths: [脚手架, 工作流, MCP扩展, 架构]
    works_with: [openai兼容, anthropic兼容, 本地]
    roles: [桌面端, DevOps, 自动化]
