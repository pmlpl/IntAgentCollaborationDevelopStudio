memory:
  backend: sqlite
  store_dir: platform/memory/store
mcp:
  gateway_enabled: false
  audit_relative: agents/{position_id}/logs/mcp-audit.log
rbac:
  inherit_parent_grants: true
review:
  skills_compliance: true
agents:
  policy: byok_only
  default: opencode
  disabled: []
  auto_detect: true
  fallback_order:
  - opencode
  - hermes
  - aider
  - goose
orchestration:
  worker_terminal_agent: opencode
  use_position_agent: true
  spawn_manager_terminal: false
  decompose_fallback: mock
research:
  mode: agent
  agent: opencode
  lmstudio:
    base_url: http://127.0.0.1:1234/v1
    api_key: ''
    model: local-model
    temperature: 0.3
    timeout_sec: 120
  ollama:
    base_url: http://127.0.0.1:11434
    model: qwen2.5:7b
    timeout_sec: 120
  search_providers:
  - github
  - bing
  - duckduckgo
  search_bing_host: cn.bing.com
  search_queries:
  - '{desc} 技术栈 开发方案'
  - '{desc} 类似产品 开源项目'
  - '{desc} similar open source github'
